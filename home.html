<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Regis</title>
        <!-- <link rel="stylesheet" href="style.css" /> -->
    </head>
    <body>
        <h1>Student Registration</h1>
        <p>All fields marked * are required.</p>

        <br>
        <form method="POST" action="insert.php" enctype="multipart/form-data">

            <h4>PERSONAL INFORMATION</h4>

            <label for="name">Name *</label><br>
            <input type="text" id="name" name="name" placeholder="e.g. Juan Dela Cruz" maxlength="40" required><br><br>
            
            <label for="age">Age *</label><br>
            <input type="number" id="age" name="age" min="0" max="99" required><br><br>

            <label for="email">Email *</label><br>
            <input type="email" id="email" name="email" maxlength="40" required><br>
            <p>Must be a valid email address (max 40 chars).</p>
            
            <h4>ACADEMIC INFORMATION</h4>

            <label for="course">Course *</label><br>
            <input type="text" id="course" name="course" placeholder="e.g. BS Computer Science" maxlength="40" required><br><br>

            <label for="yearlvl">Year Level *</label><br>
            <select id="yearlvl" name="yearlvl" required>
                <option value="1">I</option>
                <option value="2">II</option>
                <option value="3">III</option>
                <option value="4">IV</option>
            </select><br><br>

            <label for="grad">Graduating this year? *</label><br>
            <input type="checkbox" id="grad" name="grad_status" value="1"><br><br>

            <h4>PROFILE PHOTO</h4>

            <label for="image">Profile Image *</label>
            <input type="file" name="image" accept="image/*" required><br><br>
            
            <button type="submit">Submit Registration</button>
        </form>

        <!-- action.php is called if a button is clicked inside this form -->
        <form method="POST" action="action.php"> 
            <h4>RECORD MANAGEMENT</h4>
            <label for="code">LOOK UP BY STUDENT ID</label>
            <input type="text" id="code" name="search_id" placeholder="e.g. 202400001" required><br><br>
            <button type="submit" name="action" value="search">Search</button>
            <button type="submit" formaction="update.php">Update</button>
            <button type="submit" name="action" value="delete">Delete</button>
        </form>
    </body>
</html>
